  <text x="176" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="500" letter-spacing="6" fill="#C85A1E">DEVS</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="500" letter-spacing="-2" fill="#1a1a1a">Web, App &amp; AI Development</text>
